<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Administración | Conciertos Conectados</title>
  <link rel="stylesheet" href="../css/styles.css" />
  <link rel="stylesheet" href="../css/responsive.css" />
</head>
<body class="admin-page">
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <div class="brand">
        <span class="brand-title">INFERNAL</span>
        <span class="brand-subtitle">MANAGEMENT</span>
      </div>
      <nav class="sidebar-nav">
        <a href="dashboard.html">Dashboard</a>
        <a href="categorias.html">Categorías</a>
        <a href="eventos.html">Eventos</a>
        <a href="reportes.html">Reportes</a>
      </nav>
      <button id="logout-button" class="sidebar-button hidden" type="button">Cerrar sesión</button>
      <a href="../index.html" class="sidebar-button back-button" style="text-align:center;">Volver al inicio</a>
      <button id="export-json" class="sidebar-button hidden" type="button" style="margin-top:0.5rem;">Exportar JSON</button>
      <button id="publish-json" class="sidebar-button hidden" type="button" style="margin-top:0.25rem;">Publicar cambios</button>
    </aside>

    <main class="admin-content">
      <section id="login-section" class="auth-panel">
        <div class="auth-card">
          <p class="eyebrow">Administrador</p>
          <h1>Ingresa al panel</h1>
          <form id="login-form">
            <label>Email <input name="email" type="email" placeholder="Ingresa tu email" required /></label>
            <label>Contraseña <input name="password" type="password" placeholder="Ingresa tu contraseña" required /></label>
            <button type="submit" class="primary-button">Ingresar</button>
            <p id="login-error" class="error-message hidden">Credenciales incorrectas.</p>
          </form>
        </div>
      </section>
    </main>
  </div>

  <script defer src="../js/storage.js"></script>
  <script defer src="../js/registro.js"></script>
  <script defer src="../js/data-seed.js"></script>
  <script defer src="../js/admin.js"></script>
</body>
</html>
