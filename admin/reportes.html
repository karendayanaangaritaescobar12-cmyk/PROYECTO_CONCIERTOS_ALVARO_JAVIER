<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reportes | Administración</title>
  <link rel="stylesheet" href="../css/styles.css" />

<body class="admin-page">

      </div>
      <nav class="sidebar-nav">
