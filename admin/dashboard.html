<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard | Administración</title>
  <link rel="stylesheet" href="../css/styles.css" />
  <link rel="stylesheet" href="../css/responsive.css" />
</head>
<body class="admin-page">
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <div class="brand">
        <span class="brand-title">INFERNAL</span>
        <span class="brand-subtitle">MANAGEMENT</span>
      </div>
      <nav class="sidebar-nav">
        <a class="active" href="dashboard.html">Dashboard</a>
        <a href="categorias.html">Categorías</a>
        <a href="eventos.html">Eventos</a>
        <a href="reportes.html">Reportes</a>
      </nav>
      <button id="logout-button" class="sidebar-button" type="button">Cerrar sesión</button>
      <a href="../index.html" class="sidebar-button back-button" style="text-align:center;">Volver al inicio</a>
      <button id="export-json" class="sidebar-button" type="button" style="margin-top:0.5rem;">Exportar JSON</button>
      <button id="publish-json" class="sidebar-button" type="button" style="margin-top:0.25rem;">Publicar cambios</button>
    </aside>
    <main class="admin-content">
      <div class="admin-header">
        <div>
          <p class="eyebrow">Panel administrativo</p>
          <h1>Dashboard</h1>
        </div>
        <div class="live-panel">
          <span>Hora actual</span>
          <strong id="live-time">00:00:00</strong>
        </div>
      </div>
      <section class="metric-grid">
        <article class="metric-card">
          <span class="metric-label">Categorías</span>
          <strong id="count-categories">0</strong>
        </article>
        <article class="metric-card">
          <span class="metric-label">Eventos</span>
          <strong id="count-events">0</strong>
        </article>
        <article class="metric-card">
          <span class="metric-label">Ventas</span>
          <strong id="count-sales">0</strong>
        </article>
        <article class="metric-card">
          <span class="metric-label">Ingresos</span>
          <strong id="count-revenue">$0</strong>
        </article>
      </section>
    </main>
  </div>
  <script defer src="../js/storage.js"></script>
  <script defer src="../js/registro.js"></script>
  <script defer src="../js/data-seed.js"></script>
  <script defer src="../js/admin.js"></script>
</body>
</html>
